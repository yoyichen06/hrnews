<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>HR NEWS 貼文產生器</title>
  <meta name="description" content="社群貼文模板編輯器：手機、電腦都能快速套版產出貼文，支援自製模板與分類。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@400;700;900&family=Oswald:wght@400;500;700&family=Rajdhani:wght@500;700&family=Teko:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">HR&nbsp;NEWS <span>貼文產生器</span></div>
    <div class="header-actions">
      <button id="syncBtn" class="btn ghost" title="雲端同步：跨裝置使用你的資料">☁ 同步</button>
      <button id="historyBtn" class="btn ghost" title="歷史排版：打開之前做過的貼文繼續改">歷史</button>
      <button id="importBtn" class="btn ghost" title="匯入模板 JSON">匯入</button>
      <button id="exportAllBtn" class="btn ghost" title="把自製模板打包下載，方便手機↔電腦共用">匯出全部</button>
    </div>
  </header>

  <!-- 模板一覽 -->
  <main id="galleryView" class="view">
    <div class="gallery-top">
      <div id="catFilter" class="chips"></div>
      <div class="gallery-actions">
        <button id="manageCatBtn" class="btn ghost" title="新增 / 改名 / 刪除模板分類">管理分類</button>
        <button id="restoreBtn" class="btn ghost" title="把被刪掉的預設模板加回來">還原預設</button>
        <button id="importSvgBtn" class="btn ghost">匯入 SVG 模板</button>
        <button id="newTemplateBtn" class="btn primary">＋ 自製模板</button>
      </div>
    </div>
    <div id="gallery" class="gallery-grid"></div>
    <p class="empty-hint" id="emptyHint" hidden>這個分類還沒有模板，點「＋ 自製模板」建立一個吧。</p>
  </main>

  <!-- 編輯器 -->
  <main id="editorView" class="view hidden">
    <div class="editor-bar">
      <button id="backBtn" class="btn ghost">← 返回</button>
      <button id="assetToggle" class="btn ghost" title="素材庫">☰ 素材</button>
      <div id="editorTitle" class="editor-title"></div>
      <span id="saveStatus" class="save-status" title="更改會自動儲存並同步"></span>
      <button id="previewBtn" class="btn ghost" title="預覽：看看成品乾淨的樣子（沒有框線）">預覽</button>
      <div class="download-group">
        <select id="dlFormat" title="下載格式">
          <option value="image/png">PNG</option>
          <option value="image/jpeg">JPG</option>
        </select>
        <button id="downloadBtn" class="btn primary">下載這頁</button>
        <button id="downloadAllBtn" class="btn primary hidden">下載全部</button>
      </div>
    </div>

    <div class="editor-body">
      <!-- 左側素材庫（獨立面板、可分類）-->
      <aside class="asset-side" id="assetSide">
        <div class="asset-side-head">
          <span>素材庫</span>
          <button id="assetSideClose" class="modal-close" title="收合">×</button>
        </div>
        <button id="assetUploadBtn" class="btn small primary block">上傳素材</button>
        <div id="assetCats" class="asset-cats"></div>
        <div id="assetSideGrid" class="asset-side-grid"></div>
        <p class="hint-line" style="margin-top:auto">點素材可套到選取中的圖片欄位；沒選則新增到畫布。</p>
      </aside>

      <div class="stage-wrap">
        <div class="stage" id="stage">
          <canvas id="board"></canvas>
          <canvas id="overlay"></canvas>
        </div>
        <p class="stage-hint">在圖上可直接拖曳移動、四角控制點縮放（以中心點縮放）、手機可雙指縮放。</p>
        <!-- 多頁 / 輪播 -->
        <div id="pageBar" class="page-bar hidden">
          <div class="page-bar-top">
            <span class="page-bar-title">頁數（輪播）</span>
            <div class="page-add">
              <input id="pageCount" type="number" min="1" max="20" value="1" />
              <button id="addPagesBtn" class="btn small">新增頁</button>
            </div>
          </div>
          <div id="pageStrip" class="page-strip"></div>
        </div>
      </div>

      <aside class="panel">
        <!-- 自製模板設定（僅建立/編輯模板時顯示）-->
        <section id="builderTools" class="builder-tools hidden">
          <h3>模板設定</h3>
          <label class="field"><span>模板名稱</span><input id="tplName" type="text" /></label>
          <label class="field"><span>分類</span>
            <input id="tplCategory" type="text" list="catList" placeholder="例如：特戰英豪 / 遊戲新聞" />
            <datalist id="catList"></datalist>
          </label>
          <label class="field"><span>尺寸 / 比例</span>
            <select id="tplSize"></select>
          </label>
          <button id="saveTplBtn" class="btn primary block">儲存模板</button>
          <hr />
        </section>

        <!-- 新增元素（做貼文 / 編輯模板都可用）-->
        <section id="addTools" class="builder-tools">
          <h3>新增元素</h3>
          <div class="add-row">
            <button id="addTextBtn" class="btn small">＋ 文字框</button>
            <button id="addLogoBtn" class="btn small primary">＋ 圖片 / LOGO</button>
            <button id="addImageBtn" class="btn small">＋ 空圖框</button>
            <button id="addGradBtn" class="btn small">＋ 漸層遮罩</button>
            <button id="addBgBtn" class="btn small">背景圖</button>
          </div>
          <div class="add-row">
            <span class="hint-line" style="align-self:center">＋ 向量圖形</span>
            <button class="btn small addShapeBtn" data-shape="rect" title="方形">▭</button>
            <button class="btn small addShapeBtn" data-shape="ellipse" title="圓形 / 橢圓">⬤</button>
            <button class="btn small addShapeBtn" data-shape="triangle" title="三角形">▲</button>
            <button class="btn small addShapeBtn" data-shape="polygon" title="多邊形">⬢</button>
            <button class="btn small addShapeBtn" data-shape="star" title="星形">★</button>
            <button class="btn small addShapeBtn" data-shape="line" title="線">／</button>
          </div>
          <hr />
        </section>

        <div class="tabs">
          <button class="tab active" data-tab="fill">快速填寫</button>
          <button class="tab" data-tab="props">微調</button>
          <button class="tab" data-tab="layers">圖層</button>
        </div>
        <div id="fillPanel" class="tabpane"></div>
        <div id="propsPanel" class="tabpane hidden"></div>
        <div id="layersPanel" class="tabpane hidden"></div>
      </aside>
    </div>
  </main>

  <input id="fileImage" type="file" accept="image/*" hidden />
  <input id="fileImport" type="file" accept="application/json,.json" hidden />
  <input id="fileSvg" type="file" accept="image/svg+xml,.svg" hidden />
  <input id="fileAssets" type="file" accept="image/*" multiple hidden />
  <div id="modalRoot"></div>
  <div id="toast" class="toast" hidden></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
