# 純靜態網站，不需建置。直接把整個資料夾當作發佈內容。
[build]
  publish = "."
  command = ""

# 單頁應用，未知路徑一律回到首頁
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"

# HTML / CSS / JS 每次都跟伺服器確認有沒有更新（避免瀏覽器一直用舊的快取版本）
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
